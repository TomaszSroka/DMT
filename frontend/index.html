<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-row">
          <div class="brand-wrap">
            <h1 id="appTitle"></h1>
          </div>

          <div class="account-wrap">
            <button id="accountToggle" class="account-toggle" aria-haspopup="true" aria-expanded="false">
              
            </button>

            <div id="accountPanel" class="account-panel hidden">
              <label id="userNameLabel" for="userNameField"></label>
              <input id="userNameField" type="text" readonly />

              <div class="roles-block">
                <p id="rolesLabel"></p>
                <ul id="rolesList"></ul>
              </div>
            </div>
          </div>
        </div>

        <div class="topbar-row controls-row">
          <label class="dictionary-select-wrap" for="dictionarySelect">
            <span id="dictionaryLabel"></span>
            <select id="dictionarySelect"></select>
          </label>

          <label class="dictionary-select-wrap version-select-wrap" for="dictionaryVersionSelect">
            <span id="dictionaryVersionLabel"></span>
            <select id="dictionaryVersionSelect" disabled></select>
          </label>

          <div class="actions">
            <button id="saveButton" class="btn btn-save" disabled></button>
            <button id="discardButton" class="btn btn-discard" disabled></button>
            <button id="publishButton" class="btn btn-publish" disabled></button>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="card">
          <div class="card-header">
            <h2 id="tableTitle"></h2>
            <div class="table-header-actions">
              <span id="tableMeta"></span>
              <span id="pageInfo"></span>
              <div class="pager-controls">
                <button id="prevPageButton" type="button" class="btn btn-discard" disabled></button>
                <button id="nextPageButton" type="button" class="btn btn-discard" disabled></button>
              </div>
            </div>
          </div>
          <div id="tableContainer" class="table-wrap"></div>
        </section>
      </main>
    </div>

    <dialog id="editDialog" class="edit-dialog">
      <form id="editForm" class="edit-form" method="dialog">
        <div class="edit-header">
          <h3 id="editDialogTitle"></h3>
          <div class="edit-actions">
            <button id="rowSaveButton" type="button" class="btn btn-save"></button>
            <button id="rowCancelButton" type="button" class="btn btn-discard"></button>
          </div>
        </div>
        <div id="editFields" class="edit-fields"></div>
      </form>
    </dialog>

    <dialog id="discardDialog" class="confirm-dialog">
      <form id="discardForm" class="confirm-form" method="dialog">
        <div class="edit-header">
          <h3 id="discardDialogTitle"></h3>
          <div class="edit-actions">
            <button id="discardStayButton" type="button" class="btn btn-discard"></button>
            <button id="discardConfirmButton" type="button" class="btn btn-save"></button>
          </div>
        </div>
        <div class="confirm-body">
          <p id="discardDialogIntro"></p>
          <ul id="discardChangesList" class="confirm-changes"></ul>
        </div>
      </form>
    </dialog>

    <dialog id="saveDialog" class="confirm-dialog">
      <form id="saveForm" class="confirm-form" method="dialog">
        <div class="edit-header">
          <h3 id="saveDialogTitle"></h3>
          <div class="edit-actions">
            <button id="saveStayButton" type="button" class="btn btn-discard"></button>
            <button id="saveConfirmButton" type="button" class="btn btn-save"></button>
          </div>
        </div>
        <div class="confirm-body">
          <p id="saveDialogIntro"></p>
          <ul id="saveChangesList" class="confirm-changes"></ul>
        </div>
      </form>
    </dialog>

    <dialog id="discardAllDialog" class="confirm-dialog">
      <form id="discardAllForm" class="confirm-form" method="dialog">
        <div class="edit-header">
          <h3 id="discardAllDialogTitle"></h3>
          <div class="edit-actions">
            <button id="discardAllStayButton" type="button" class="btn btn-discard"></button>
            <button id="discardAllConfirmButton" type="button" class="btn btn-save"></button>
          </div>
        </div>
        <div class="confirm-body">
          <p id="discardAllDialogIntro"></p>
          <ul id="discardAllChangesList" class="confirm-changes"></ul>
        </div>
      </form>
    </dialog>

    <script src="./config-frontend.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
