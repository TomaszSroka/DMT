<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-row">
          <div class="brand-wrap">
            <h1 id="appTitle"></h1>
          </div>

          <div class="account-wrap">
            <button id="accountToggle" class="account-toggle" aria-haspopup="true" aria-expanded="false">
              
            </button>

            <div id="accountPanel" class="account-panel hidden">
              <p id="userNameLabel" class="account-field-label"></p>
              <p id="userNameField" class="account-user-value"></p>
              <hr class="account-separator" />
              <p id="rolesLabel" class="account-roles-label"></p>
              <ul id="rolesList"></ul>
            </div>
          </div>
        </div>

        <div class="topbar-row controls-row">
          <label class="dictionary-select-wrap" for="dictionarySelect">
            <span id="dictionaryLabel"></span>
            <select id="dictionarySelect"></select>
          </label>

          <label class="dictionary-select-wrap version-select-wrap" for="dictionaryVersionSelect">
            <span id="dictionaryVersionLabel"></span>
            <select id="dictionaryVersionSelect" disabled></select>
          </label>

          <button id="showVersionDetailsButton" type="button" class="btn btn-discard" disabled></button>

          <div class="actions">
            <button id="editButton" class="btn btn-save" disabled></button>
            <button id="saveButton" class="btn btn-save" disabled></button>
            <button id="publishButton" class="btn btn-publish" disabled></button>
            <button id="discardButton" class="btn btn-discard" disabled></button>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="card">
          <div class="card-header">
            <div class="table-header-layout">
              <span id="currentDictionaryInfo" class="current-dictionary-info"></span>
              <div class="table-header-actions">
                <div class="table-header-left">
                  <button id="openFiltersButton" type="button" class="btn btn-discard" disabled></button>
                  <span id="activeFiltersInfo"></span>
                </div>
                <div class="table-header-right">
                  <div class="pager-controls">
                    <button id="prevPageButton" type="button" class="btn btn-discard" disabled></button>
                    <button id="nextPageButton" type="button" class="btn btn-discard" disabled></button>
                  </div>
                  <span id="pageInfo"></span>
                  <span id="tableMeta"></span>
                </div>
              </div>
            </div>
          </div>
          <div id="tableContainer" class="table-wrap"></div>
        </section>
      </main>

    </div>


    <dialog id="recordDetailsDialog" class="record-details-dialog">
      <form method="dialog" class="record-details-form">
        <div class="card-header record-details-header">
          <div style="display: flex; align-items: center; justify-content: flex-start; gap: 18px; width: 100%;">
            <h1 id="recordDetailsTitle" class="brand-title record-details-title" style="text-align: left; margin-right: auto;">Version History</h1>
            <div class="edit-actions record-details-actions">
              <button id="recordDetailsCloseButton" type="button" class="btn btn-discard">Close</button>
            </div>
          </div>
        </div>

        <div id="recordDetailsFields" class="record-details-fields"></div>
      </form>
    </dialog>



    <dialog id="discardDialog" class="confirm-dialog">
      <form id="discardForm" class="confirm-form" method="dialog">
        <div class="edit-header">
          <h3 id="discardDialogTitle"></h3>
          <div class="edit-actions">
            <button id="discardStayButton" type="button" class="btn btn-discard"></button>
            <button id="discardConfirmButton" type="button" class="btn btn-save"></button>
          </div>
        </div>
        <div class="confirm-body">
          <p id="discardDialogIntro"></p>
          <ul id="discardChangesList" class="confirm-changes"></ul>
        </div>
      </form>
    </dialog>

    <dialog id="saveDialog" class="confirm-dialog">
      <form id="saveForm" class="confirm-form" method="dialog">
        <div class="edit-header">
          <h3 id="saveDialogTitle"></h3>
          <div class="edit-actions">
            <button id="saveConfirmButton" type="button" class="btn btn-save"></button>
            <button id="saveStayButton" type="button" class="btn btn-discard"></button>
          </div>
        </div>
        <div class="confirm-body">
          <p id="saveDialogIntro"></p>
          <ul id="saveChangesList" class="confirm-changes"></ul>
        </div>
      </form>
    </dialog>

    <dialog id="discardAllDialog" class="confirm-dialog">
      <form id="discardAllForm" class="confirm-form" method="dialog">
        <div class="edit-header">
          <h3 id="discardAllDialogTitle"></h3>
          <div class="edit-actions">
            <button id="discardAllStayButton" type="button" class="btn btn-discard"></button>
            <button id="discardAllConfirmButton" type="button" class="btn btn-save"></button>
          </div>
        </div>
        <div class="confirm-body">
          <p id="discardAllDialogIntro"></p>
          <ul id="discardAllChangesList" class="confirm-changes"></ul>
        </div>
      </form>
    </dialog>

    <dialog id="versionDetailsDialog" class="version-details-dialog">
      <form id="versionDetailsForm" class="version-details-form" method="dialog">
        <div class="edit-header">
          <h3 id="versionDetailsTitle"></h3>
          <div class="edit-actions">
            <button id="versionDetailsCloseButton" type="button" class="btn btn-discard"></button>
          </div>
        </div>
        <div id="versionDetailsContent" class="version-details-content"></div>
      </form>
    </dialog>

    <dialog id="errorDetailsDialog" class="error-details-dialog">
      <form id="errorDetailsForm" class="error-details-form" method="dialog">
        <div class="edit-header">
          <h3 id="errorDetailsTitle"></h3>
          <div class="edit-actions">
            <button id="errorDetailsCopyButton" type="button" class="btn btn-save"></button>
            <button id="errorDetailsCloseButton" type="button" class="btn btn-discard"></button>
          </div>
        </div>
        <div class="error-details-content">
          <p id="errorDetailsMessage" class="error-details-message"></p>
          <pre id="errorDetailsText" class="error-details-text"></pre>
        </div>
      </form>
    </dialog>

    <dialog id="filtersDialog" class="filters-dialog">
      <form id="filtersForm" class="filters-form" method="dialog">
        <div class="edit-header filters-header">
          <h3 id="filtersDialogTitle"></h3>
          <div class="filters-actions-group filters-actions-center">
            <button id="filtersAddRuleButton" type="button" class="btn btn-discard"></button>
            <button id="filtersClearButton" type="button" class="btn btn-discard"></button>
          </div>
          <div class="filters-actions-group filters-actions-right">
            <button id="filtersApplyButton" type="button" class="btn btn-save"></button>
            <button id="filtersApplyCloseButton" type="button" class="btn btn-save"></button>
            <button id="filtersCloseButton" type="button" class="btn btn-discard"></button>
          </div>
        </div>
        <div class="filters-content">
          <p id="filtersDialogIntro" class="filters-intro"></p>
          <div id="filtersRulesList" class="filters-rules-list"></div>
        </div>
      </form>
    </dialog>

    <script src="./config-frontend.js"></script>
    <script src="./config-runtime.js"></script>
    <script src="./shared-ui.js"></script>
    <script src="./api-client.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
