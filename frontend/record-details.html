<dialog id="recordDetailsDialog" class="record-details-dialog">
  <form method="dialog" class="record-details-form">
    <div class="card-header" style="padding: 24px 32px 18px 32px; border-bottom: 1px solid var(--border); background: var(--panel-bg);">
      <h2 id="recordDetailsTitle" class="card-title">Szczegóły rekordu</h2>
      <div class="edit-actions">
        <button id="recordDetailsCloseButton" type="button" class="btn btn-discard">Zamknij</button>
      </div>
    </div>
    <div id="recordDetailsFields" class="record-details-fields" style="padding: 32px 32px 32px 32px; min-width: 0;"></div>
  </form>
</dialog>
